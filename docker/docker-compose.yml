version: '3.9'
services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    environment:
      PORT: 3000
      NODE_ENV: development
    ports:
      - '3000:3000'
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: profitflow
    ports:
      - '5432:5432'
